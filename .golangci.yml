version: "2"
run:
  go: "1.26"
  timeout: 5m
  modules-download-mode: readonly
  relative-path-mode: gomod
linters:
  default: standard
  enable:
    - copyloopvar
    - dupword
    - durationcheck
    - errorlint
    - forbidigo
    - gocritic
    - misspell
    - nilerr
    - nolintlint
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    forbidigo:
      forbid:
        - pattern: '^fmt\.Print(f|ln)?$'
          msg: "emit user-facing stdout via internal/cli (cli.Success/Info/Print); machine output via cli.Print/Println/Printf"
        - pattern: '^fmt\.Fprint(f|ln)?$'
          msg: "write stdout/stderr via internal/cli, not fmt.Fprint*(os.Stdout/os.Stderr); formatting into a non-CLI buffer (strings.Builder) needs //nolint:forbidigo"
    gocritic:
      disabled-checks:
        - ifElseChain
  exclusions:
    generated: strict
    presets:
      - common-false-positives
      - std-error-handling
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - golines
    - goimports
  settings:
    gci:
      custom-order: true
      sections:
        - standard
        - default
        - localmodule
    gofumpt:
      module-path: github.com/lmilojevicc/seshagy
    goimports:
      local-prefixes:
        - github.com/lmilojevicc/seshagy
  exclusions:
    generated: strict
