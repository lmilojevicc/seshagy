# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: seshagy

builds:
  - id: seshagy
    main: ./cmd/seshagy
    binary: seshagy
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*
      - scripts/seshagy-focus-kill

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Refactoring
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Maintenance
      regexp: '^.*?chore(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^test:"

release:
  github:
    owner: lmilojevicc
    name: seshagy
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"

brews:
  - name: seshagy
    homepage: https://github.com/lmilojevicc/seshagy
    description: "Agent-aware terminal dashboard for tmux and herdr"
    directory: Formula
    install: |
      bin.install "seshagy"
      bin.install "scripts/seshagy-focus-kill" => "seshagy-focus-kill"
    caveats: |
      The seshagy-focus-kill launcher is installed alongside the binary.
      Wire a one-key launcher with: seshagy keybind install tmux (or: herdr)
      Requires tmux or herdr on PATH.
    repository:
      owner: lmilojevicc
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: "104729643+lmilojevicc@users.noreply.github.com"
