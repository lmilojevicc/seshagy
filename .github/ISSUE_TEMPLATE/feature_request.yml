name: Feature request
description: Suggest a new capability or an enhancement to seshagy.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement to seshagy!

        Before you start, please [search existing issues](https://github.com/lmilojevicc/seshagy/issues) and [discussions](https://github.com/lmilojevicc/seshagy/discussions) to avoid duplicates.

        A quick note on scope: seshagy supports both **tmux** and **herdr** as
        multiplexer backends, and agent state is reported by integrations into
        the `@seshagy_agent_*` namespace (under tmux). Under herdr, agent state
        is read-only from herdr's own `agent_status`. Keep this model in mind
        when proposing agent-related features.

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do, and what is the pain point with how seshagy works today?
      placeholder: I'm trying to …, but seshagy currently …
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: The proposed solution
      description: What would you like seshagy to do instead? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you have thought about.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Mockups, screenshots, links, or anything else that helps.
    validations:
      required: false
