name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up mise tools
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: mise run fmt:check

      - name: Run linters
        run: mise run lint

      - name: Run vet
        run: mise run vet

      - name: Run tests
        run: mise run test

      - name: Run vulnerability checks
        run: mise run vuln

      - name: Build CLI
        run: mise run build
